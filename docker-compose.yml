version: "3.9"

# Local development only — never expose these credentials to production.
# Prod uses a managed Postgres instance (Cloud SQL / RDS); see system-design § 6.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: match3
      POSTGRES_PASSWORD: match3dev
      POSTGRES_DB: match3
    ports:
      # Non-standard port to avoid clashing with any local Postgres installation.
      - "5433:5432"
    volumes:
      - match3_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U match3 -d match3"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: be/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://match3:match3dev@postgres:5432/match3
      PORT: 3001

  frontend:
    build:
      context: .
      dockerfile: fe/Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:3001
    ports:
      - "5173:80"

  shell:
    build:
      context: .
      dockerfile: shell/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  match3_pgdata:
