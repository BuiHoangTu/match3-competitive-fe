version: "3.9"

# Local development only — never expose these credentials to production.
# Prod uses a managed Postgres instance (Cloud SQL / RDS); see system-design § 6.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: match3
      POSTGRES_PASSWORD: match3dev
      POSTGRES_DB: match3
    ports:
      # Non-standard port to avoid clashing with any local Postgres installation.
      - "5433:5432"
    volumes:
      - match3_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U match3 -d match3"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: be/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://match3:match3dev@postgres:5432/match3
      PORT: 3001
      # Local dev secrets only — replace with `openssl rand -hex 32` values
      # for any non-local deployment.
      ROOM_TOKEN_SECRET: dev_room_token_secret_change_me_use_openssl_rand_hex_32
      SESSION_TOKEN_SECRET: dev_session_token_secret_change_me_use_openssl_rand_hex_32
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: fe/Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:3001
    ports:
      - "5173:80"

  shell:
    build:
      context: .
      dockerfile: shell/Dockerfile
      args:
        # URLs baked into the Flutter Web bundle. Override these when deploying
        # to a non-localhost host (e.g. BACKEND_URL=https://api.example.com,
        # GAME_URL=https://app.example.com/game/).
        BACKEND_URL: http://localhost:3001
        GAME_URL: http://localhost:5173/game/
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  match3_pgdata:
