# Three services. The shell container serves both the Flutter Web app and
# the embedded Phaser bundle from the same origin (`/` and `/game/`), so
# postMessage between shell ↔ game and the Socket.IO handshake from the
# game iframe to the backend stay simple.
#
# Local development only — never expose the placeholder secrets in prod.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: match3
      POSTGRES_PASSWORD: match3dev
      POSTGRES_DB: match3
    ports:
      # Non-standard port to avoid clashing with any local Postgres installation.
      - "5433:5432"
    volumes:
      - match3_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U match3 -d match3"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://match3:match3dev@postgres:5432/match3
      PORT: 3001
      # SECURITY: these are placeholder dev secrets. Anyone who knows these
      # strings can forge valid session JWTs and room tokens against this
      # deployment. Before exposing this stack on any network beyond
      # localhost, replace BOTH values via docker-compose.override.yml or a
      # .env file with strong random values:
      #   openssl rand -hex 32
      ROOM_TOKEN_SECRET: dev_room_token_secret_change_me_use_openssl_rand_hex_32
      SESSION_TOKEN_SECRET: dev_session_token_secret_change_me_use_openssl_rand_hex_32
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Backend origin baked into the shell + game bundles. Override when
        # deploying behind a different domain.
        BACKEND_URL: http://localhost:3001
        VITE_BACKEND_URL: http://localhost:3001
    ports:
      - "8080:80"
    cpus: 2.0
    depends_on:
      - backend

volumes:
  match3_pgdata:
