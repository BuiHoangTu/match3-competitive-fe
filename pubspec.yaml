name: shell
description: "Match-3 competitive game — Flutter universal shell (iOS, Android, Web)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Lightweight Flutter game loop/rendering layer for the native match board.
  flame: ^1.23.0

  # Navigation
  go_router: ^17.0.0

  # Legal / markdown screens
  flutter_markdown_plus: ^1.0.0

  # Optional Google OAuth provider. App sessions still come from backend local auth.
  google_sign_in: ^7.0.0

  # Hashing for non-sensitive token log correlation.
  crypto: ^3.0.5

  # HTTP client for matchmaking REST calls (T-v0.6-F01)
  http: ^1.2.0

  # Native Socket.IO client for Flutter board-delta online matches.
  socket_io_client: ^3.1.2

  # Persistent local storage for the session token (T-Local-09).
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/sprites/
