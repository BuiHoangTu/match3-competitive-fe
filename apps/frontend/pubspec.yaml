name: shell
description: "Match-3 competitive game — Flutter universal shell (iOS, Android, Web)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # Legal / markdown screens
  flutter_markdown: ^0.7.0

  # Firebase (T-v0.6-C01 — requires Firebase project setup before activating on device)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0

  # Auth providers (T-v0.6-C03, T-v0.6-C04)
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.2

  # Crypto — SHA-256 nonce hashing for Apple Sign-In (T-v0.6-C03)
  crypto: ^3.0.5

  # HTTP client for matchmaking REST calls (T-v0.6-F01)
  http: ^1.2.0

  # WebView for embedded game view — iOS/Android (T-v0.6-A08b)
  webview_flutter: ^4.0.0

  # Persistent local storage for the session token (T-Local-09).
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
